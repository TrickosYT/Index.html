<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beyblade X</title>
<link rel="icon" href="img/logo.png" type="image/x-icon" />

<style>
  body {
    margin: 0;
    padding: 0;
    background: url('img/0.jpg') no-repeat center center fixed;
    background-size: cover;
    font-family: 'Arial', sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: start;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Волны звука снизу */
  .sound-wave {
    position: fixed;
    width: 100%;
    height: 150px;
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    z-index: -1;
  }
  /* Нижняя волна */
  .sound-wave.bottom {
    bottom: 0;
    flex-direction: row-reverse;
  }

  /* Линии для волны снизу */
  .line {
    width: 8px;
    height: 20px;
    border-radius: 3px;
  }

  /* Спектрограмма в самом низу, растянутая на всю ширину */
  .spectrum {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 50px;
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    z-index: 1;
  }

  /* Каждая полоска спектрограммы */
  .spectrum-bar {
    width: 2px;
    border-radius: 2px;
  }

  /* Заголовок */
  header {
    background-color: rgba(20, 20, 20, 0.9);
    width: 100%;
    padding: 20px 0;
    text-align: center;
    font-size: 3em;
    font-weight: bold;
    letter-spacing: 2px;
    color: #FFD700;
    text-shadow: 0 0 4px #FFD700, 0 0 8px #FFD700, 0 0 12px #FFD700;
  }

  /* Контейнер с изображением и текстом */
  .beyblade-container {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(27, 38, 59, 0.8);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
    max-width: 600px;
    width: 90%;
  }

  .beyblade-image {
    width: 100%;
    max-width: 400px;
    border: 3px solid #00CED1;
    border-radius: 10px;
    box-shadow: 0 0 8px #00CED1;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .beyblade-image:hover {
    transform: rotate(5deg) scale(1.05);
    box-shadow: 0 0 15px #00CED1, 0 0 15px #00CED1 inset;
  }

  h2 {
    margin-top: 20px;
    font-size: 2em;
    color: #00BFFF;
    text-shadow: 0 0 4px #00BFFF, 0 0 8px #00BFFF, 0 0 12px #00BFFF;
  }

  p {
    margin-top: 15px;
    font-size: 1.2em;
    text-align: center;
    color: #66CCCC;
    text-shadow: 0 0 2px #66CCCC, 0 0 4px #66CCCC;
  }

  /* Кнопка с неоновым эффектом */
  .btn {
    margin-top: 30px;
    padding: 15px 30px;
    font-size: 1.2em;
    color: #000;
    background-color: #FFD700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 4px #FFD700, 0 0 8px #FFD700 inset;
    transition: background-color 0.3s, transform 0.3s, box-shadow 0.3s;
  }

  .btn:hover {
    background-color: #FFC107;
    transform: scale(1.05);
    box-shadow: 0 0 8px #FFC107, 0 0 12px #FFC107 inset;
  }
</style>
</head>
<body>

<!-- Волны звука снизу -->
<div class="sound-wave bottom" id="bottomWave"></div>

<!-- Спектрограмма в самом низу, растянутая на всю ширину -->
<div class="spectrum" id="spectrum"></div>

<header>Beyblade X</header>

<div class="beyblade-container">
    <img src="img/logo.png" alt="Beyblade" class="beyblade-image" />
    <h2>Новая эра Beyblade</h2>
    <p>Испытай свою силу и стратегию с Beyblade X! Вращай, соревнуйся и побеждай!</p>
    <!-- Добавленная кнопка с id -->
    <button id="moreBtn" class="btn">Узнать больше</button>
</div>

<script>
const spectrumContainer = document.getElementById('spectrum');

const numBars = 199;
const bars = [];

for (let i = 0; i < numBars; i++) {
  const bar = document.createElement('div');
  bar.className = 'spectrum-bar';
  spectrumContainer.appendChild(bar);
  // Инициализация высоты
  bar._height = Math.random() * 40 + 10;
  // Индекс полоски для волнового эффекта
  bar._index = i;
  bars.push(bar);
}

// Переменная для цветовой волны
let hueOffset = 0;
const hueSpeed = 2; // скорость цветового движения

function animate() {
  hueOffset += hueSpeed;

  for (let i = 0; i < numBars; i++) {
    const bar = bars[i];
    // Расчет цвета с плавным сдвигом
    const hue = (i / numBars) * 360 + hueOffset;
    bar.style.backgroundColor = `hsl(${hue % 360}, 100%, 50%)`;
  }

  // Обновляем высоты спектрограммы
  bars.forEach(bar => {
    const heightDiff = bar._height - bar._targetHeight;
    bar._height -= heightDiff * 0.02;
    if (Math.abs(heightDiff) < 1) {
      bar._targetHeight = Math.random() * 40 + 10;
    }
    bar.style.height = bar._height + 'px';
  });

  requestAnimationFrame(animate);
}

// Инициализация высот
bars.forEach(bar => {
  bar._targetHeight = Math.random() * 40 + 10;
});

// Обработчик для кнопки "Узнать больше"
const moreBtn = document.getElementById('moreBtn');
moreBtn.addEventListener('click', () => {
  window.location.href = '---1.html'; // замените на нужный вам URL
});

requestAnimationFrame(animate);
</script>

</body>
</html>
